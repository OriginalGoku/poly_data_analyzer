# Sentrux rules — generated by /setup-sentrux
# Commit this file. Other .sentrux/ artifacts are per-machine; see .gitignore.

[constraints]
max_cycles = 10
max_cc = 20
no_god_files = false

[scan]
exclude = [
  "data/",
  "cache/",
  "analysis_outputs/",
  "backtest_results/",
  "__pycache__/",
  ".venv/",
  "venv/",
  ".serena/",
  ".pytest_cache/",
  ".mypy_cache/",
  "node_modules/",
  "dist/",
  "build/",
  "target/",
  ".next/",
  "vendor/",
  ".claude/worktrees/",
]
